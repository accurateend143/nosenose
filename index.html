<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Demo Supabase + Render</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    p.sub { color: #888; font-size: 0.85rem; margin-top: 0; margin-bottom: 24px; }
    form.add-form { display: flex; gap: 8px; margin-bottom: 28px; }
    input[type="text"] { flex: 1; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
    button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
    .btn-add  { background: #3ecf8e; color: #fff; }
    .btn-save { background: #4a90d9; color: #fff; }
    .btn-del  { background: #ff5c5c; color: #fff; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid #eee; }
    li form { display: flex; gap: 6px; flex: 1; }
    li form input { flex: 1; }
    .empty { color: #aaa; font-style: italic; margin-top: 12px; }
  </style>
</head>
<body>

  <h1>📋 Lista de items</h1>
  <p class="sub">Demo minimalista · Supabase + Render</p>

  <form class="add-form" action="/add" method="POST">
    <input type="text" name="nombre" placeholder="Nuevo item..." required>
    <button class="btn-add" type="submit">Agregar</button>
  </form>

  <ul>
    {% for item in items %}
    <li>
      <form action="/edit/{{ item.id }}" method="POST">
        <input type="text" name="nombre" value="{{ item.nombre }}">
        <button class="btn-save" type="submit">Guardar</button>
      </form>
      <a href="/delete/{{ item.id }}"><button class="btn-del" type="button">Borrar</button></a>
    </li>
    {% else %}
    <p class="empty">No hay items todavía. ¡Agregá uno!</p>
    {% endfor %}
  </ul>

</body>
</html>
